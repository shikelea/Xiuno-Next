<script id="kumquat_js">
    var jform = $("#form");
    var jsubmit = $("#submit");
    jform.on('submit',
        function () {
            jform.reset();
            jsubmit.button('loading');
            var postdata = jform.serialize();
            $.xpost(jform.attr('action'), postdata,
                function (code, message) {
                    if (code == 0) {
                        $.alert(message);
                        jsubmit.text(message).delay(2000).button('reset');
                        return;
                    } else {
                        $.alert(message);
                        jsubmit.button('reset');
                    }
                });
            return false;
        });
    var kumquat_reset_form = $("#kumquat_reset_form");
    var kumquat_reset_submit = $("#kumquat_reset_confirm");
    kumquat_reset_submit.on('click',
        function () {
            kumquat_reset_form.reset();
            kumquat_reset_submit.button('loading');
            var postdata = kumquat_reset_form.serialize();
            $.xpost(kumquat_reset_form.attr('action'), postdata,
                function (code, message) {
                    if (code == 0) {
                        $.alert(message);
                        kumquat_reset_submit.text(message).delay(2000).button('reset');
                        return;
                    } else {
                        $.alert(message);
                        kumquat_reset_submit.button('reset');
                    }
                });
            return false;
        });
    var kumquat_bg_select = $(".kumquat-background-presets > select");
    kumquat_bg_select.on('change', function () {
        selected_url = $(this).children('[value="' + this.value + '"]').attr('data-value');
        $(this).parents('.kumquat-bgimage').children('.kumquat-background-url').children('input').val(selected_url);
        $(this).parents('.kumquat-bgimage').children('.content-demo.bgimage_demo').css('background-image', 'url(' + selected_url + ')');
    });
</script>
