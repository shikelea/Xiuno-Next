<?php $haya_favorite_check_favorite = haya_favorite_find_by_uid_and_tid($uid, $tid); ?>
<?php if (empty($uid)): /* 未登录 */ ?>
<button class="btn btn-outline-warning js-haya-favorite-tip"
        data-tid="<?=$tid?>"
        hx-on:click="AetherPlugin.haya_favorite.handleLoginRequired(<?=$tid?>, this)">
    <i class="la la-star-o"></i>
    <span class="ms-1"><?=lang('haya_favorite_add')?></span>
    <span class="badge bg-warning-subtle text-warning haya-favorite-user-count" title="<?= lang('haya_favorite_user_count') ?>"><?= intval($thread['favorites']); ?></span>

<?php elseif ($haya_favorite_check_favorite): /* 已收藏 */ ?>
