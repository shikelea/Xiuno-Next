<?php if (isset($haya_post_like_config['thread_like_position']) && $haya_post_like_config['thread_like_position'] == 2) :
	if (isset($haya_post_like_config['open_thread']) && $haya_post_like_config['open_thread'] == 1) :
		$haya_post_like_is_delete = false;

		if (isset($haya_post_like_config['like_is_delete']) && $haya_post_like_config['like_is_delete'] == 1) {
			$haya_post_like_is_delete = true;
		}

		$haya_post_like_thread_check = haya_post_like_find_by_uid_and_pid($uid, $first['pid']);
?>

			<?php if (empty($uid)) : /* 未登录 */ ?>
				<button class="btn btn-outline-primary js-haya-post-like-thread-tip"
					data-pid="<?= $first['pid'] ?>"
					title="<?= lang('haya_post_like_like_thread') ?>"
					onclick="AetherPlugin.haya_post_like.handleLikeLogin(<?= $tid ?>, this)">
					<i class="la la-thumbs-up"></i>
					<span class="haya-post-like-thread-btn">
						<?= lang('haya_post_like_like') ?>
					</span>
					<span class="badge bg-primary-subtle text-primary haya-post-like-thread-user-count" title="<?= lang('haya_post_like_like_count') ?>"><?= intval($first['likes']) ?></span>
				</button>

			<?php else: /* 已登录 */ ?>
				<?php if ($haya_post_like_thread_check) : /* 已点赞 */ ?>
					<button class="btn bg-primary-subtle js-haya-post-like-thread-del"
						data-pid="<?= $first['pid'] ?>"
						title="<?= $haya_post_like_is_delete ? lang('haya_post_like_unlike') : lang('haya_post_like_has_like') ?>"
						hx-post="<?= url('post-post_like-delete') ?>"
						hx-vals='{"pid": <?= $first['pid'] ?>, "from": "thread_plugin_body"}'
						hx-target="this"
						hx-swap="outerHTML"
						hx-on:before-request="this.disabled=true">
						<i class="la la-thumbs-up" aria-label="<?= $haya_post_like_is_delete ? lang('haya_post_like_unlike') : lang('haya_post_like_has_like') ?>"></i>
						<span class="haya-post-like-thread-btn"><?= lang('haya_post_like_has_like') ?></span>
						<span class="badge bg-primary-subtle text-primary haya-post-like-thread-user-count" title="<?= lang('haya_post_like_like_count') ?>"><?= intval($first['likes']) ?></span>
					</button>
				<?php else: /* 未点赞 */ ?>
					<button class="btn btn-outline-primary js-haya-post-like-thread-add"
						data-pid="<?= $first['pid'] ?>"
						title="点赞本帖"
						hx-post="<?= url('post-post_like-create') ?>"
						hx-vals='{"pid": <?= $first['pid'] ?>, "from": "thread_plugin_body"}'
						hx-target="this"
						hx-swap="outerHTML"
						hx-on:before-request="this.disabled=true">
						<i class="la la-thumbs-o-up" aria-label="<?= lang('haya_post_like_like_thread') ?>"></i>
						<span class="haya-post-like-thread-btn"><?= lang('haya_post_like_like') ?></span>
						<span class="badge bg-primary-subtle text-primary haya-post-like-thread-user-count" title="<?= lang('haya_post_like_like_count') ?>"><?= intval($first['likes']) ?></span>
					</button>
				<?php endif; ?>
			<?php endif; ?>

	<?php endif; ?>
<?php endif; ?>
