<script>
    // VIP价格和成长值配置
    var vipPrices = {
        'month': <?= $set['month_fee']; ?>, // 月付价格
    'season': <?= $set['season_fee']; ?>, // 季付价格
        'half_year': <?= $set['half_year_fee']; ?>, // 半年付价格
            'year': <?= $set['year_fee']; ?> // 年付价格
};

    var vipGrows = {
        'month': <?= $set['month_grow']; ?>, // 月付成长值
    'season': <?= $set['season_grow']; ?>, // 季付成长值
        'half_year': <?= $set['half_year_grow']; ?>, // 半年付成长值
            'year': <?= $set['year_grow']; ?> // 年付成长值
};
    var credit_type = "<?= $set['fee_type'];?>";
    // 更新VIP信息显示
    function updateVIPInfo() {
        const selectedType = document.querySelector('input[name="buy_type"]:checked').value;
        const buyNum = parseInt(document.getElementById('jnum').value) || 1;
        const ratio = credit_type == '3' ? 0.01 : 1;
        // 计算总价格和总成长值
        const totalPrice = (vipPrices[selectedType] * ratio) * buyNum;
        const totalGrow = vipGrows[selectedType] * buyNum;

        // 更新显示
        document.getElementById('jpay').value = credit_type == '3' ? totalPrice.toFixed(2) : totalPrice.toFixed(0);
        document.getElementById('jgrow').value = totalGrow;
    }

    // 页面加载时初始化显示
    AetherExec(function () {
        updateVIPInfo();
        document.getElementById('jnum').addEventListener('input', updateVIPInfo);
        document.getElementById('jnum').addEventListener('change', updateVIPInfo);
    });
</script>
