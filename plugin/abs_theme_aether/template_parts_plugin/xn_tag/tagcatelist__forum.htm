<?php if(!empty($forum['tagcatelist'])): ?>
<div class="tag-filter-container mb-4">
    <form action="<?= url('forum-' . $fid . '-1') ?>" 
          method="get" 
          class="tag-filter-form"
          hx-boost="true" 
          hx-target=".threadlist" 
          hx-swap="innerHTML" 
          hx-include=".pagination_extra_param, .header_tabs_extra_param">
        
        <?php foreach($forum['tagcatelist'] as $i => $tagcate): ?>
        <div class="filter-category mb-3">
            <h6 class="filter-category-title mb-2 text-muted"><?= $tagcate['name']; ?></h6>
            
            <div class="chips-wrapper">
                <!-- "全部"选项 -->
                <?php
                $active_all = false;
                switch ($i) {
                    case 0: $active_all = (0 == $tagid1 || empty($tagid1)); break;
                    case 1: $active_all = (0 == $tagid2 || empty($tagid2)); break;
                    case 2: $active_all = (0 == $tagid3 || empty($tagid3)); break;
                    case 3: $active_all = (0 == $tagid4 || empty($tagid4)); break;
                }
                ?>
                <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" 
                           id="xn_tag__pos_<?= $i ?>__val_0" 
                           name="tagids[<?= $i ?>]" 
                           value="0" 
                           <?= $active_all ? 'checked' : '' ?>>
                    <label class="form-check-label chip " 
                           for="xn_tag__pos_<?= $i ?>__val_0">
                        全部
                    </label>
                </div>
                
                <!-- 标签选项 -->
                <?php foreach($tagcate['taglist'] as $tag): ?>
                <?php
                $active = false;
                switch ($i) {
                    case 0: $active = $tag['tagid'] == $tagid1; break;
                    case 1: $active = $tag['tagid'] == $tagid2; break;
                    case 2: $active = $tag['tagid'] == $tagid3; break;
                    case 3: $active = $tag['tagid'] == $tagid4; break;
                }
                ?>
                <div class="form-check form-check-inline m-0">
                    <input class="form-check-input" type="radio" 
                           id="xn_tag__pos_<?= $i ?>__val_<?= $tag['tagid'] ?>" 
                           name="tagids[<?= $i ?>]" 
                           value="<?= $tag['tagid'] ?>" 
                           <?= $active ? 'checked' : '' ?>>
                    <label class="form-check-label chip chip-outlined" 
                           for="xn_tag__pos_<?= $i ?>__val_<?= $tag['tagid'] ?>">
                        <?php if (!empty($tag['style'])): ?>
                        <span class="color-indicator bg-<?= $tag['style'] ?> me-1"></span>
                        <?php endif; ?>
                        <?= $tag['name']; ?>
                    </label>
                </div>
                <?php endforeach; ?>
            </div>
        </div>
        <?php endforeach; ?>
        
        <div class="filter-actions mt-3">
            <button type="submit" class="btn btn-primary rounded-pill px-4">
                <i class="las la-filter me-1"></i>应用筛选
            </button>
            <button type="reset" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="las la-redo me-1"></i>重置
            </button>
        </div>
    </form>
</div>
<?php endif; ?>
