    <script>
function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    
    const files = e.dataTransfer.files;
    const accept = document.getElementById('aether-attach-input').accept;
    
    // 过滤文件类型
    const validFiles = Array.from(files).filter(file => {
        if (!accept) return true;
        
        // 简单的accept验证
        const fileExt = '.' + file.name.split('.').pop().toLowerCase();
        const acceptList = accept.split(',');
        
        return acceptList.some(pattern => {
            if (pattern.startsWith('.')) {
                return fileExt === pattern;
            }
            if (pattern.includes('/*')) {
                const mimeType = pattern.split('/*')[0];
                return file.type.startsWith(mimeType);
            }
            return file.type === pattern;
        });
    });
    
    if (validFiles.length === 0) {
        showSnackbar({
            type: 'warning',
            title: '文件类型不支持',
            content: '拖拽的文件类型不在允许范围内',
            delay: 3000
        });
        return;
    }
    
    if (validFiles.length < files.length) {
        showSnackbar({
            type: 'info',
            title: '部分文件已过滤',
            content: `${files.length - validFiles.length}个文件类型不支持`,
            delay: 3000
        });
    }
    
    const input = document.getElementById('aether-attach-input');
    const dataTransfer = new DataTransfer();
    validFiles.forEach(file => dataTransfer.items.add(file));
    input.files = dataTransfer.files;
    
    htmx.trigger(input, 'change');
}
    </script>
