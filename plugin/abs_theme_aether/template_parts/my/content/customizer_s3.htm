		<!-- 引入必要的脚本 -->
		<script src="./plugin/abs_theme_aether/view/js/aether_color_extract.js"></script>
		<script src="./plugin/abs_theme_aether/view/js/md3-color-generator.js"></script>

		<!-- JavaScript -->
		<script>
			// 初始化标志，确保只执行一次
			var customizerInitialized = false;

			// 初始化函数
			function initCustomizer() {
				// 如果已经初始化过，直接返回
				if (customizerInitialized) {
					return;
				}

				// 标记为已初始化
				customizerInitialized = true;
				loadSavedSettings();
				setTimeout(() => {
					extractColorsFromImages();

				}, 300);
				bindEvents();
			}

			// 加载保存的设置
			function loadSavedSettings() {
				// 加载颜色模式
				const savedTheme = localStorage.getItem('aether_preferred_theme');
				if (savedTheme) {
					document.querySelector(`input[name="aether_preferred_theme"][value="${savedTheme}"]`).checked = true;
				}

				// 加载主色调设置
				const useCustomColor = localStorage.getItem('aether_use_custom_color');
				if (useCustomColor !== null) {
					document.getElementById('aether_use_custom_color').checked = parseInt(useCustomColor) === 1;
				}

				// 加载字号设置
				const savedFontSize = localStorage.getItem('aether_font_size');
				if (savedFontSize) {
					document.getElementById('aether_font_size').value = savedFontSize;
					document.getElementById('aether_font_size_value').textContent = savedFontSize + 'px';
					document.getElementById('aether_font_size_preview').style.fontSize = savedFontSize + 'px';
					// 应用到全局 CSS 变量
					document.body.style.setProperty('--bs-body-font-size', savedFontSize + 'px');
					document.documentElement.style.setProperty('--bs-body-font-size', savedFontSize + 'px');
				}

				// 加载通知设置
				const notificationSound = localStorage.getItem('aether_notification_sound');
				if (notificationSound !== null) {
					document.getElementById('aether_notification_sound').checked = parseInt(notificationSound) === 1;
				}

				const enableToast = localStorage.getItem('aether_enable_toast');
				if (enableToast !== null) {
					document.getElementById('aether_enable_toast').checked = parseInt(enableToast) === 1;
				}
			}

			// 绑定事件
			function bindEvents() {
				// 颜色模式切换
				document.querySelectorAll('input[name="aether_preferred_theme"]').forEach(radio => {
					radio.addEventListener('change', function () {
						if (this.checked) {
							const theme = this.value;
							localStorage.setItem('aether_preferred_theme', theme);
							if (typeof Aether.applyTheme === 'function') {
								Aether.applyTheme(theme, true);
							}
						}
					});
				});

				// 使用自定义颜色
				document.getElementById('aether_use_custom_color').addEventListener('change', function () {
					const value = this.checked ? 1 : 0;
					localStorage.setItem('aether_use_custom_color', value);
					// 重新应用主题颜色
					if (typeof Aether.loadPrimaryColor === 'function') {
						Aether.loadPrimaryColor();
					}
				});

				// 标准颜色选择
				document.querySelectorAll('.aether-standard-color').forEach(colorDiv => {
					colorDiv.addEventListener('click', function () {
						const color = this.dataset.color;
						selectColor(color);
					});
				});

				// 字号调整
				const fontSizeSlider = document.getElementById('aether_font_size');
				const fontSizeValue = document.getElementById('aether_font_size_value');
				const fontSizePreview = document.getElementById('aether_font_size_preview');

				fontSizeSlider.addEventListener('input', function () {
					const size = this.value;
					fontSizeValue.textContent = size + 'px';
					fontSizePreview.style.fontSize = size + 'px';

					// 改一个变量，控制全局
					document.body.style.setProperty('--bs-body-font-size', size + 'px');
					document.documentElement.style.setProperty('--bs-body-font-size', size + 'px');

				});

				fontSizeSlider.addEventListener('change', function () {
					const size = this.value;
					localStorage.setItem('aether_font_size', size);
					if (typeof Aether.setFontSize === 'function') {
						Aether.setFontSize(size, true);
					}
				});

				// 通知设置
				document.getElementById('aether_notification_sound').addEventListener('change', function () {
					const value = this.checked ? 1 : 0;
					console.info('aether_notification_sound now is ' + value);
					localStorage.setItem('aether_notification_sound', value);
				});

				document.getElementById('aether_enable_toast').addEventListener('change', function () {
					const value = this.checked ? 1 : 0;
					console.info('aether_enable_toast now is ' + value);
					localStorage.setItem('aether_enable_toast', value);
				});

				// 重置设置
				document.getElementById('aether_reset_settings').addEventListener('click', function () {
					if (confirm('确定要重置所有设置吗？')) {
						resetSettings();
					}
				});
			}

			// 提取图片颜色
			async function extractColorsFromImages() {
				const avatarImg = document.getElementById('aether_extract_color_img_avatar');
				const coverImg = document.getElementById('aether_extract_color_img_cover');
				const recommendedColorsContainer = document.getElementById('aether_recommended_colors');

				recommendedColorsContainer.innerHTML = '';

				// 提取头像颜色
				if (avatarImg && avatarImg.src) {
					try {
						console.log('开始提取头像颜色');
						const avatarColors = await processImageToPalette(avatarImg);
						console.log(avatarColors);
						avatarColors.forEach(color => {
							const colorDiv = document.createElement('div');
							colorDiv.className = 'aether-recommended-color';
							colorDiv.style.setProperty('--c', color);
							colorDiv.dataset.color = color;
							colorDiv.title = '来自头像';
							colorDiv.addEventListener('click', function () {
								selectColor(color);
							});
							recommendedColorsContainer.appendChild(colorDiv);
						});
					} catch (e) {
						console.error('提取头像颜色失败:', e);
					}
				}

				// 提取封面图颜色
				if (coverImg && coverImg.src) {
					try {
						console.log('开始提取封面图颜色');
						const coverColors = await processImageToPalette(coverImg);
						coverColors.forEach(color => {
							const colorDiv = document.createElement('div');
							colorDiv.className = 'aether-recommended-color';
							colorDiv.style.setProperty('--c', color);
							colorDiv.dataset.color = color;
							colorDiv.title = '来自封面图';
							colorDiv.addEventListener('click', function () {
								selectColor(color);
							});
							recommendedColorsContainer.appendChild(colorDiv);
						});
					} catch (e) {
						console.error('提取封面图颜色失败:', e);
					}
				}
			}

			// 选择颜色
			function selectColor(color) {
				// 移除所有选中状态
				document.querySelectorAll('.aether-standard-color, .aether-recommended-color').forEach(el => {
					el.classList.remove('selected');
				});

				// 添加选中状态
				document.querySelectorAll(`[data-color="${color}"]`).forEach(el => {
					el.classList.add('selected');
				});

				// 保存设置
				localStorage.setItem('aether_primary_color', color);
				if (typeof Aether.setPrimaryColor === 'function') {
					Aether.setPrimaryColor(color, true);
				}
			}

			// 重置设置
			function resetSettings() {
				// 移除所有localStorage项
				localStorage.removeItem('aether_preferred_theme');
				localStorage.removeItem('aether_use_custom_color');
				localStorage.removeItem('aether_primary_color');
				localStorage.removeItem('aether_md3_colors_css');
				localStorage.removeItem('aether_font_size');
				localStorage.removeItem('aether_notification_sound');
				localStorage.removeItem('aether_enable_toast');

				// 重置表单
				document.getElementById('aether_font_size').value = 16;
				document.getElementById('aether_font_size_value').textContent = '16px';
				document.getElementById('aether_font_size_preview').style.fontSize = '16px';
				// 重置全局 CSS 变量
				document.body.style.setProperty('--bs-body-font-size', '16px');
				document.documentElement.style.setProperty('--bs-body-font-size', '16px');
				document.getElementById('aether_use_custom_color').checked = false;
				document.getElementById('aether_notification_sound').checked = true;
				document.getElementById('aether_enable_toast').checked = true;
				document.getElementById('aether_recommended_colors').innerHTML = '';

				// 移除选中状态
				document.querySelectorAll('.aether-standard-color, .aether-recommended-color').forEach(el => {
					el.classList.remove('selected');
				});

				// 应用默认设置
				if (typeof Aether.applyTheme === 'function') {
					Aether.applyTheme('light', true);
				}
				if (typeof Aether.setFontSize === 'function') {
					Aether.setFontSize(16, true);
				}

				// 更新mockup预览
				updateMockupPreview();

				alert('设置已重置');
			}

			AetherExec(function () {
				initCustomizer();
			});

		</script>
	</slot>
