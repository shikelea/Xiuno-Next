<script src="plugin/abs_theme_aether/view/vendor/tinymce/tinymce.min.js"></script>
<script src="plugin/abs_theme_aether/view/vendor/tinymce/init_quickreply.js"></script>

<script>
    // 初始化 TinyMCE 相关功能的函数
    function initTinyMCEFeatures() {
        // 启动HTML模式
        document.querySelector('input[name="doctype"]').value = 0;

        // 取文本框message所在form表单
        var xn_sbform = document.querySelector('form#quick_reply_form');

        // 给submit挂载同步事件；实际上tinymce的保存是在init.js里的setup函数里做的，在这里只是为了多重保险
        if (xn_sbform) {
            xn_sbform.addEventListener('submit', function () {
                if (tinyMCE && tinyMCE.editors['message']) {
                    tinyMCE.editors['message'].save();
                }
            });
        }

        setTimeout(() => {
            Aether.updateTinyMCETheme(document.body.getAttribute('data-bs-theme') || 'light');
        }, 500);

        // ===== 新增：监听 textarea 被清空，同步清空 TinyMCE 编辑器 =====
        // 仅为了"zackma"的反馈："快速回复框，已经回复成功的内容，仍然会在输入框中显示，这个问题有解吗？"
        // 对，你没看错，需要这么多代码来解决这个
        function setupTextareaObserver() {
            var textarea = document.querySelector('#message');

            if (!textarea) {
                // 如果 textarea 不存在，稍后重试
                setTimeout(setupTextareaObserver, 100);
                return;
            }

            // 方法1：MutationObserver 监听 value 属性变化
            var observer = new MutationObserver(function (mutations) {
                mutations.forEach(function (mutation) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'value') {
                        // 当 textarea 的 value 被设置为空时
                        if (!textarea.value || textarea.value.trim() === '') {
                            // 同步清空 TinyMCE 编辑器
                            if (tinyMCE && tinyMCE.editors['message']) {
                                tinyMCE.editors['message'].setContent('');
                                console.log('检测到 textarea 被清空，已同步清空 TinyMCE 编辑器');
                            }
                        }
                    }
                });
            });

            // 开始观察 textarea
            observer.observe(textarea, {
                attributes: true,
                attributeFilter: ['value']
            });

            console.log('已设置 textarea 清空监听器');
        }

        // 等待 TinyMCE 初始化完成
        function waitForTinyMCE() {
            if (typeof tinyMCE !== 'undefined' && tinyMCE.editors['message']) {
                // TinyMCE 已初始化，设置监听器
                setupTextareaObserver();

                // 额外监听表单提交成功事件（如果使用 AJAX）
                var form = document.querySelector('form#quick_reply_form');
                if (form) {
                    form.addEventListener('submit', function () {
                        // 提交后延迟检查并清空
                        setTimeout(function () {
                            var textarea = document.querySelector('#message');
                            if (textarea && (!textarea.value || textarea.value.trim() === '')) {
                                if (tinyMCE && tinyMCE.editors['message']) {
                                    tinyMCE.editors['message'].setContent('');
                                    console.log('表单提交后清空编辑器');
                                }
                            }

                            // 新增：检查并点击符合条件的 .reply-item.quote 中的 .post_reply
                            var quotedItems = document.querySelectorAll('.postlist .reply-item.quote');
                            if (quotedItems.length === 1) {
                                var postReplyBtn = quotedItems[0].querySelector('.post_reply');
                                if (postReplyBtn) {
                                    console.log('找到引用帖子，点击回复按钮取消其引用状态');
                                    postReplyBtn.click();
                                }
                            }
                        }, 500);
                    });
                }
            } else {
                // TinyMCE 还未初始化，等待
                setTimeout(waitForTinyMCE, 100);
            }
        }

        // 开始等待 TinyMCE 初始化
        waitForTinyMCE();
    }

    // 页面加载完成后初始化
    AetherExec(function () {
        setTimeout(function () {
            if (document.querySelector('form#quick_reply_form') !== null) {
                initTinyMCEFeatures();
            }
        }, 10);
    });

</script>
