<div class="container placeholder-wave">

    <!-- 帖子头部信息 -->
    <header class="post-header card-body mb-4 px-3">
        <h1 class="h2 mb-2 placeholder w-50">
        </h1>

        <div class="d-flex align-items-center justify-content-between my-3 small">
            <div>
                <i class="la la-folder"></i>
                <span class="placeholder" style="width: 6em;"></span>
            </div>
            <div class="d-flex flex-wrap gap-2 text-muted">
                <span>
                    <i class="la la-eye"></i>
                    <span class="placeholder" style="width: 2em;"></span>

                </span>
                <span>
                    <i class="la la-thumbs-up"></i>
                    <span class="placeholder" style="width: 2em;"></span>
                </span>
                <span>
                    <i class="la la-star"></i>
                    <span class="placeholder" style="width: 2em;"></span>

                </span>
                <span>
                    <i class="la la-comment"></i>
                    <span class="placeholder" style="width: 2em;"></span>

                </span>
            </div>
        </div>


    </header>
    <section class="post-content card border-0">

        <!-- 作者信息和统计 -->
        <div class="d-flex align-items-center justify-content-between card-body pb-0">
            <span class="d-flex align-items-center">

                <div class="avatar avatar-lg placeholder"></div>

                <div>

                    <div class="fw-bold">
                        <span class="username">
                            <span class="placeholder" style="width: 7em;"></span>

                        </span>
                    </div>
                    <div class="text-muted small">
                        <span class="placeholder" style="width: 5em;"></span>

                    </div>

                </div>
            </span>
            <div class="text-end">
            </div>
        </div>

        <article class="message card-body">
            <p class="placeholder col-11"></p>
            <p class="placeholder col-12"></p>
            <p class="placeholder col-10"></p>
            <p class="placeholder col-12"></p>
            <p class="placeholder w-25"></p>
            <p class="placeholder w-0"></p>

        </article>

        <!-- 帖子互动功能区 -->
        <div class="post-interactions card-footer pt-0">
        </div>
    </section>


    <!-- 帖子导航 -->
    <section class="post-navigation mt-4">
        <div class="card" style="background-color: var(--bs-tertiary-content-bg);">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <span href="#" class="text-decoration-none">
                            <div class="d-flex align-items-center">
                                <span class="me-2">←</span>
                                <div class="flex-grow-1 overflow-hidden">
                                    <div class="small text-muted placeholder" style="width:3em"></div>
                                    <div class="text-truncate h5">
                                        <span class="placeholder w-25"></span>

                                    </div>
                                </div>
                            </div>
                        </span>
                    </div>
                    <div class="col-md-6 text-end">
                        <span href="#" class="text-decoration-none">
                            <div class="d-flex align-items-center justify-content-end">
                                <div class="flex-grow-1 overflow-hidden">
                                    <div class="small text-muted placeholder" style="width:3em"></div>
                                    <div class="text-truncate h5">
                                        <span class="placeholder w-25" ></span>

                                    </div>
                                </div>
                                <span class="ms-2">→</span>
                            </div>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 回帖列表区域 -->
    <section class="replies-section mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3 px-3">
            <h5 class="mb-0">
                <span class="placeholder" style="width: 10em;"></span>
            </h5>

        </div>
        <div class="card">
            <div class="card-body postlist py-0">
                    <!--{hook aether_skeleton__post_list.htm}-->

            </div>
        </div>
    </section>
</div>
