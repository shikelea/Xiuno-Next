<?php
if (empty($uid)) {
	message(-1, "请先登录。");
	die();
}
$num_pid = db_count('user_pay', array('uid' => $uid));
$page = param(2, 1);
$data =  db_find('user_pay', array('uid' => $uid), array('time' => -1), $page, $pagesize = 20);
$pagination = pagination(url("my-record-{page}"), $num_pid, $page, $pagesize);
function subject($tid) {
	$r = thread_read_cache($tid);
	return $r['subject'];
}
?>
<template include="./plugin/abs_theme_aether/overwrite/plugin/tt_credits/view/htm/my_credits.template.htm">
	<slot name="my_body">

		<div class="card">
			<?php if ($data): ?>
				<div class="list-group list-group-flush" id="record_list">
					<?php foreach ($data as $v) {
						$c_type = $v['credit_type'];
						$credit_amount = $v['num'] > 0 ? ($c_type == '3' ? $v['num'] / 100.0 : $v['num']) . ' ' . ($c_type <= 3 ? lang('credits' . $c_type) : '') : '-';
						$credit_type = $g_credits_type_array[$v['type']] . ',' . $g_credits_status_array[$v['status'] + 1];
						$is_positive = $v['num'] > 0;
					?>

						<div class="list-group-item px-3 py-3 border-bottom">
							<!-- 移动端优化：更紧凑的布局 -->
							<div class="d-flex justify-content-between align-items-start mb-2">
								<div class="d-flex align-items-center gap-2">
									<span title="<?= lang("c_type"); ?>">
										<?= $credit_type; ?>
									</span>
								</div>
								<time class="text-muted small" title="<?= lang("c_time"); ?>" datetime="<?= date('Y-m-d H:i:s', $v['time']); ?>">
									<?= date('m-d H:i', $v['time']); ?>
								</time>
							</div>

							<!-- 移动端优化：垂直堆叠布局 -->
							<div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
								<div title="<?= lang("record"); ?>" class="text-break">
									<span class="text-muted"><?= $v['code']; ?></span>
								</div>
								<div title="<?= lang("credits"); ?>">
									<?php if ($is_positive): ?>
										<span class="text-success fw-bold fs-6">+<?= $credit_amount; ?></span>
									<?php else: ?>
										<span class="text-danger fw-bold fs-6">-<?= $credit_amount; ?></span>
									<?php endif; ?>
								</div>
							</div>
						</div>

					<?php } ?>
				</div>
			<?php else: ?>
				<div class="card-body text-center py-5">
					<?php include _include(APP_PATH . 'plugin/abs_theme_aether/template_parts/common/fragments/empty.htm'); ?>
					<div class="mt-3">
						<small class="text-muted"><?= lang('credits_record_empty_hint'); ?></small>
					</div>
				</div>
			<?php endif; ?>
		</div>

		<!-- 分页优化：移动端更友好的间距 -->
		<?php if ($data && $pagination): ?>
			<nav class="text-center mt-4 px-2">
				<ul class="pagination justify-content-center pagination-sm"><?= $pagination; ?></ul>
			</nav>
		<?php endif; ?>

		<script>
			AetherExec(function() {
				setActive("my-record", "*", ".my_nav");
			});
		</script>
	</slot>
</template>
