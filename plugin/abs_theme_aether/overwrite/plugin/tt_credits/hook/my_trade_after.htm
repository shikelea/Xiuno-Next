<div class="card">
	<div class="card-header pb-0">
		<h5 class="card-title mb-0"><?= lang('tran_credits');?></h5>
	</div>
	<div class="card-body">
		<form method="post" id="form_trans" action="<?= url('my-trade');?>" hx-post="<?= url('my-trade');?>" hx-confirm="<?= lang('sure_to_transfer');?>" hx-target="#trans-result" hx-swap="innerHTML" hx-trigger="submit">
		<input type="hidden" name="op" value="t">
		<div class="row">
				<div class="col-md-6">
					<div class="form-group">
						<label for="trans_username"><?= lang('please_input_to_username');?></label>
						<input type="text" class="form-control mr-1" id="trans_username" name="trans_username" />
					</div>
				</div>
				<div class="col-md-6">
					<div class="form-group">
						<label for="trans_num"><?= lang('please_input_to_money');?></label>
						<div class="input-group">
							<input type="number" min="0" max="2147483647" class="form-control" id="trans_num" name="trans_num" />
							<select name="trans_credits" class="form-control w-fit flex-grow-0 flex-shrink-1">
								<option value="1"><?= lang('credits1');?></option>
								<option value="2" selected><?= lang('credits2');?></option>
								<option value="3"><?= lang('credits3');?></option>
							</select>
						</div>
					</div>
				</div>
			</div>


			<div class="d-flex mt-3 justify-content-between">
				<div id="trans-result"></div>
				<button type="submit" class="btn btn-info justify-content-end" id="trans_use"><?= lang('tran_credits');?></button>
			</div>
		</form>
	</div>
</div>
