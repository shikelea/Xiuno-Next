        <script>
            var coverUpload = document.getElementById('cover_upload');
            var coverPreview = document.getElementById('cover_preview');
            var previewImage = document.getElementById('preview_image');
            var uploadProgress = document.getElementById('upload_progress');
            var progressFill = document.getElementById('progress_fill');
            var progressText = document.getElementById('progress_text');
            var coverImageUrl = document.getElementById('cover_image_url');
            var customSubmit = document.getElementById('custom_submit');
            var uploadArea = document.querySelector('.cover-upload-area');

            // 上传功能
            coverUpload.addEventListener('change', function (e) {
                var files = xn.get_files_from_event(e);
                if (files.length > 0) {
                    // 显示预览
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        previewImage.src = e.target.result;
                        coverPreview.style.display = 'block';
                    };
                    reader.readAsDataURL(files[0]);

                    // 显示上传进度
                    uploadProgress.style.display = 'block';

                    // 上传文件
                    xn.upload_file(
                        files[0],
                        xn.url('my-cover'), {
                            upload_custom_cover: 1
                        },
                        function (code, message) {
                            if (code == 0) {
                                coverImageUrl.value = message.url;
                                uploadProgress.style.display = 'none';
                                // 自动提交
                                customSubmit.click();
                                showSnackBar({ type: 'success', content: '成功' });
                            } else {
                                showSnackBar({ type: 'danger', content: message });
                                uploadProgress.style.display = 'none';
                            }
                        },
                        function (percent) {
                            progressFill.style.width = percent + '%';
                            progressText.textContent = percent + '%';
                        }
                    );
                }
            });

            // 拖拽上传
            uploadArea.addEventListener('dragover', function (e) {
                e.preventDefault();
                uploadArea.classList.add('border-primary');
            });

            uploadArea.addEventListener('dragleave', function (e) {
                e.preventDefault();
                uploadArea.classList.remove('border-primary');
            });

            uploadArea.addEventListener('drop', function (e) {
                e.preventDefault();
                uploadArea.classList.remove('border-primary');
                var files = e.dataTransfer.files;
                if (files.length > 0) {
                    coverUpload.files = files;
                    coverUpload.dispatchEvent(new Event('change'));
                }
            });
        </script>
