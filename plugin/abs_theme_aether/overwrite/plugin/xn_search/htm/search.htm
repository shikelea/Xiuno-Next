		<script>
			// 保存搜索历史
			function saveSearchHistory(keyword) {
				// 去除关键词前后空白字符
				keyword = keyword.trim();

				// 如果关键词为空，不保存
				if (!keyword) {
					return;
				}

				// 读取现有历史记录
				let history = JSON.parse(localStorage.getItem('aether_search_history') || '[]');

				// 去重：如果已存在则删除旧记录
				const existingIndex = history.indexOf(keyword);
				if (existingIndex > -1) {
					history.splice(existingIndex, 1);
				}

				// 将新关键词添加到开头
				history.unshift(keyword);

				// 限制历史记录数量（最多保存10条）
				if (history.length > 10) {
					history = history.slice(0, 10);
				}

				// 保存到localStorage
				localStorage.setItem('aether_search_history', JSON.stringify(history));
			}

			// 渲染搜索历史
			function renderSearchHistory() {
				// 从localStorage读取历史记录
				const history = JSON.parse(localStorage.getItem('aether_search_history') || '[]');
				const historyList = document.getElementById('search_history_list');

				// 清空现有列表
				historyList.innerHTML = '';

				// 如果没有历史记录，显示提示
				if (history.length === 0) {
					historyList.innerHTML = '<li class="list-group-item text-muted text-center">暂无搜索历史</li>';
					return;
				}

				// 遍历历史记录，生成li元素
				history.forEach(keyword => {
					const li = document.createElement('li');
					li.className = 'list-group-item list-group-item-action';
					li.innerHTML = `<a href="<?= url('search') ?>?keyword=${encodeURIComponent(keyword)}" class="d-block text-decoration-none text-body" hx-on:click="document.getElementById('keyword').value = this.textContent.trim(); return true;">${keyword}</a>`;
					historyList.appendChild(li);
				});

				// 重新绑定HTMX属性
				if (typeof htmx !== 'undefined') {
					htmx.process(historyList);
				}
			}

			// 清空搜索历史
			function clearSearchHistory() {
				// 从localStorage删除历史记录
				localStorage.removeItem('aether_search_history');

				// 清空列表内容
				const historyList = document.getElementById('search_history_list');
				historyList.innerHTML = '<li class="list-group-item text-muted text-center">暂无搜索历史</li>';
			}

			AetherExec(function () {
				renderSearchHistory();
			})
		</script>
