<button role="button" class="btn btn-info" data-bs-toggle="modal" data-bs-target="#add_hide_content_modal">添加隐藏内容</button>
<div class="modal fade" id="add_hide_content_modal" tabindex="-1" role="dialog" aria-labelledby="add_hide_content_label" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header">
				<h4 class="modal-title" id="add_hide_content_label">添加隐藏内容</h4>
			</div>
			<div class="modal-body py-0">
				<div class="form-group mb-4">
					<label class="form-label">选择隐藏类型：</label>
					<div class="btn-group w-100" role="group" aria-label="选择隐藏类型">
						<input class="btn-check" type="radio" name="hide_type" id="hide_type_login" value="login" checked>
						<label class="btn btn-outline-primary border" for="hide_type_login">登录可见</label>
						<input class="btn-check" type="radio" name="hide_type" id="hide_type_reply" value="reply">
						<label class="btn btn-outline-primary border" for="hide_type_reply">回复可见</label>
					</div>
				</div>
				<div class="form-group">
					<label class="form-label" for="hide_content">隐藏内容：</label>
					<textarea class="form-control" name="hide_content" id="hide_content" style="height: 8rem;" placeholder="请输入需要隐藏的内容"></textarea>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-bs-dismiss="modal">取消</button>
				<button type="button" class="btn btn-primary" onclick="add_hide_content_submit_modal()">添加</button>
			</div>
		</div>
	</div>
</div>
<script type="text/javascript">
	function add_hide_content_submit_modal() {
		var modalEl = document.getElementById('add_hide_content_modal');
		var modal = bootstrap.Modal.getInstance(modalEl);
		if (modal) {
			modal.hide();
		}
		
		var hide_type = document.querySelector('input[name="hide_type"]:checked').value;
		var hide_content = document.getElementById('hide_content').value;

		if (hide_content) {
			if (hide_type === 'login') {
				tinymce.activeEditor.insertContent('[ttlogin]' + hide_content + '[/ttlogin]', 1);
			} else if (hide_type === 'reply') {
				tinymce.activeEditor.insertContent('[ttreply]' + hide_content + '[/ttreply]', 1);
			}
			document.getElementById('hide_content').value = '';
		}
	}
</script>
