<?php
if (!function_exists('thread_hot_list')) {
	function thread_hot_list($fid) {
		$result = cache_get('get_site_thread_hot_list_' . $fid);
		if (empty($result)) {
			$result = thread__find(array('fid' => $fid), array('views' => -1), 1, 10);
			cache_set('get_site_thread_hot_list_' . $fid, $result, 3600); //有效期1小时
		}
		return $result;
	}
}
