


<script id="xn_tag_js">
	AetherExec(
		function () {
			if (document.querySelector('select[name="fid"]')) {
				document.querySelector('select[name="fid"]').addEventListener('change', function (evt) {
					let new_fid = evt.target.value;
					let new_url = xn.url('forum-gettagcatelist-' + new_fid);
					htmx.ajax(
						'GET',
						new_url,
						{
							target: '#nav_tag_list_div',
							swap: 'innerHTML'
						}
					);
				});
			}
		});

</script>
