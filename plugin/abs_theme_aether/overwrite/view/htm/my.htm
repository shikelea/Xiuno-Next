		$extra_profile_content_raw = ob_get_clean();

		// 处理hook内容：去除<br>标签，并套进li标签
		if (!empty($extra_profile_content_raw)) {
			// 去除所有<br>和<br />标签
			$cleaned_content = preg_replace('/<br\s*\/?>/i', '', $extra_profile_content_raw);

		// 将内容按行分割，每行套进li标签
		$lines = explode("\n", trim($cleaned_content));
		foreach ($lines as $line) {
		$line = trim($line);
		if (!empty($line)) {
		$extra_profile_content .= '<li class="list-group-item">' . $line . '</li>';
		}
		}
		}
