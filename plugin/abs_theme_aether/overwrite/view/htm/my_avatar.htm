<template include="./plugin/abs_theme_aether/overwrite/view/htm/my.template.htm">
	<slot name="my_body">
		<div>
			<section class="form-group text-center position-relative" style="width: fit-content; margin: 0 auto;">
				<style scoped>
					.avatar-overlay {
						position: absolute;
						top: 0;
						left: 0;
						width: 100%;
						height: 100%;
						background-color: rgba(0, 0, 0, 0.5);
						color: white;
						display: flex;
						align-items: center;
						justify-content: center;
						opacity: 0;
						transition: opacity 0.3s ease;
						cursor: pointer;
					}

					.avatar-overlay:hover {
						opacity: 1;
					}

					.avatar-overlay span {
						font-size: 0.8em;
						text-align: center;
					}
				</style>
				<!-- Avatar image -->
				<img id="avatar_img" class="img-thumbnail rounded-circle" src="<?= $user['avatar_url'];?>" style="width:10vw;min-width: 64px;max-width: 128px;">

				<!-- Hover overlay -->
				<div class="avatar-overlay rounded-circle" hx-on:click="document.getElementById('avatar_upload').click()">
					<span><?= lang('update') . ' ' . lang('modify_avatar');?></span>
				</div>

				<!-- Hidden file input -->
				<input type="file" id="avatar_upload" accept="image/gif,image/jpeg,image/png,image/jpg,image/bmp" class="upload custom-file-input sr-only" value="<?= lang('modify_avatar');?>" />
			</section>
			<div class="progress my-2 d-none">
				<div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="width: 0%" id="avatar_progress"></div>
			</div>
		</div>

		<script>
			AetherExec(function () {
				setActive("my-avatar", "*", ".my_nav");
			});
		</script>

		<script>
			var avatarUpload = document.getElementById('avatar_upload');
			var progressBar = document.getElementById('avatar_progress');
			var avatarImg = document.getElementById('avatar_img');
			var progressContainer = progressBar.parentElement;

			progressContainer.classList.add('d-none');
			avatarUpload.addEventListener('change', function (e) {
				var files = xn.get_files_from_event(e);
				xn.upload_file(
					files[0],
					xn.url('my-avatar'),
					{ width: 128, height: 128, action: 'clip', filetype: 'png' },
					function (code, message) {
						if (code == 0) {
							avatarImg.src = message.url + '?' + Math.random();
							showSnackBar({ type: 'success', content: '成功' });
							setTimeout(function () {
								progressContainer.classList.add('d-none');
							}, 1000);
						} else {
							showSnackBar({ type: 'danger', content: message });
						}
					},
					function (percent) {
						progressContainer.classList.remove('d-none');
						progressBar.style.width = percent + '%';
					}
				);
			});

		</script>
	</slot>
</template>
