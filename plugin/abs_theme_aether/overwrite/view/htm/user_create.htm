<?php $AETHER_S6_VISIBLE = true; 
$AETHER_S6_CLOSE_BUTTON_HREF = url('index');
?>
<template include="./plugin/abs_theme_aether/template_parts/structure/router.htm">
	<slot name="S6_Body">
		<?php include _include(APP_PATH.'plugin/abs_theme_aether/template_parts/auth/content/register_s6.htm'); ?>
		<script>
			AetherExec(function () {
				<?php if(!$IS_HTMX): ?> Aether.showS6(); <?php endif; ?>
				var jform = $('#form');
				var jsubmit = $('#submit');
				var jsend = $('#sendcode');
				/*
				var referer = '<?= http_referer();?>';
			*/
				jsend.on('click', function () {
					console.warn('请使用原生JS实现我的功能！')
					jform.reset();
					jsend.button('loading');
					var postdata = jform.serialize();
					$.xpost(jsend.attr('action'), postdata, function (code, message) {
						if (code == 0) {
							$('#code').focus();
							var t = 60; // 倒计时
							jsend.button('<?= lang('user_send_sucessfully');?> 60 ');
							jsubmit.button('reset');
							// 倒计时，重新发送
							var handler = setInterval(function () {
								jsend.button('<?= lang('user_send_sucessfully');?> ' + (--t) + ' ');
								if (t == 0) {
									clearInterval(handler);
									jsend.button('reset');
								}
							}, 1000);
						} else if (code < 0) {
							$.alert(message, -1);
							jsend.button('reset');
						} else {
							jform.find('[name="' + code + '"]').alert(message).focus();
							jsend.button('reset');
						}
					});
					return false;
				});
			});

		</script>
		<!--{hook user_create_js.htm}-->
	</slot>
</template>
