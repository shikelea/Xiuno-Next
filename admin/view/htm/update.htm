<script>

$('#nav li.nav-item-update').addClass('active');

function update_progress(percent, text) {
	$('#update_log').show();
	$('#update_progress').css('width', percent + '%').text(percent + '%');
	$('#update_status').text(text);
}

function do_update() {
	if(!confirm(lang.update_confirm || '确定要更新吗？更新前请确保已备份重要数据。')) return;

	var btn = $('#btn_update');
	btn.prop('disabled', true).text(lang.update_updating || '正在更新...');

	update_progress(10, lang.update_step_download || '正在下载最新版本...');

	$.xpost('<?php echo url("update-download");?>', {}, function(code, message) {
		if(code == 0) {
			update_progress(100, message);
			$('#update_progress').removeClass('progress-bar-animated').addClass('bg-success');
			btn.text(lang.update_completed || '更新完成').removeClass('btn-primary').addClass('btn-success');
			setTimeout(function() {
				if(confirm(lang.update_reload || '更新成功，是否刷新页面？')) {
					location.reload();
				}
			}, 1000);
		} else {
			update_progress(0, message);
			$('#update_progress').removeClass('progress-bar-animated').addClass('bg-danger').css('width', '100%').text(lang.update_failed || '更新失败');
			btn.prop('disabled', false).text(lang.update_retry || '重试');
		}
	});
}

</script>
