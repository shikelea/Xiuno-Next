<script>

$('#nav li.nav-item-update').addClass('active');

function update_progress(percent, text) {
	$('#update_log').show();
	$('#update_progress').css('width', percent + '%').text(percent + '%');
	$('#update_status').text(text);
}

// 代理选择：显示/隐藏自定义输入框
$('input[name="proxy_select"]').on('change', function() {
	$('#custom_proxy_wrap').toggle($(this).val() === 'custom');
});
// 页面加载时检查
if($('input[name="proxy_select"]:checked').val() === 'custom') $('#custom_proxy_wrap').show();

function get_selected_proxy() {
	var val = $('input[name="proxy_select"]:checked').val();
	if(val === 'custom') return $('#custom_proxy_url').val().replace(/\/+$/, '');
	return val || '';
}

function test_single_proxy(proxy_url, $status) {
	$status.html('<span class="badge bg-secondary">' + (lang.update_proxy_testing || '测试中...') + '</span>');
	$.xpost('<?php echo url("update-test_proxy");?>', {proxy_url: proxy_url}, function(code, message) {
		if(code == 0) {
			var ms = message.latency || message;
			$status.html('<span class="badge bg-success">' + (lang.update_proxy_available || '可用') + '</span> <span class="badge bg-info">' + ms + 'ms</span>');
		} else {
			$status.html('<span class="badge bg-danger">' + (lang.update_proxy_unavailable || '不可用') + '</span>');
		}
	});
}

function test_all_proxies() {
	$('.proxy-status').each(function() {
		var $el = $(this);
		var proxy = $el.data('proxy');
		if(proxy === 'custom') {
			var custom_val = $('#custom_proxy_url').val().replace(/\/+$/, '');
			if(custom_val) test_single_proxy(custom_val, $el);
			return;
		}
		// proxy 是空字符串表示直连，也测试
		test_single_proxy(proxy === undefined ? '' : proxy, $el);
	});
}

function save_proxy() {
	var proxy = get_selected_proxy();
	$.xpost('<?php echo url("update-save_proxy");?>', {proxy_url: proxy}, function(code, message) {
		if(code == 0) {
			$.alert(lang.update_proxy_save_ok || '代理设置已保存');
		} else {
			$.alert(message);
		}
	});
}

function do_update() {
	if(!confirm(lang.update_confirm || '确定要更新吗？更新前请确保已备份重要数据。')) return;

	var btn = $('#btn_update');
	btn.prop('disabled', true).text(lang.update_updating || '正在更新...');

	update_progress(10, lang.update_step_download || '正在下载最新版本...');

	$.xpost('<?php echo url("update-download");?>', {}, function(code, message) {
		if(code == 0) {
			update_progress(100, message);
			$('#update_progress').removeClass('progress-bar-animated').addClass('bg-success');
			btn.text(lang.update_completed || '更新完成').removeClass('btn-primary').addClass('btn-success');
			setTimeout(function() {
				if(confirm(lang.update_reload || '更新成功，是否刷新页面？')) {
					location.reload();
				}
			}, 1000);
		} else {
			update_progress(0, message);
			$('#update_progress').removeClass('progress-bar-animated').addClass('bg-danger').css('width', '100%').text(lang.update_failed || '更新失败');
			btn.prop('disabled', false).text(lang.update_retry || '重试');
		}
	});
}

</script>
